name: Weekly Poll Update

on:
  schedule:
    # Sunday 9 PM EDT (UTC-4) = Monday 01:00 UTC
    - cron: '0 1 * * 1'
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 matplotlib numpy

      - name: Run poll update
        run: python3 update_polls.py

      - name: Run projection update
        run: python3 update_projections.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_polls.csv regional_polls.csv regional_average.json \
                  current_average.json polling_average.csv polling_averages.png \
                  seat_projection.json riding_projections.csv riding_projections.html \
                  seat_projection.png seat_history.csv docs/index.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Weekly update — $(date -u '+%Y-%m-%d')"
          git push
